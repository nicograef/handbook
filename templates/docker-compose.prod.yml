# docker-compose.prod.yml template
# Full production stack: app + DB + nginx reverse proxy + Let's Encrypt.
#
# Prerequisites:
#   1. DNS A record pointing to the server IP
#   2. .env file with DB credentials
#   3. TLS certificate obtained (see scripts/prod-init.sh or guides/letsencrypt-docker.md)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d

services:
  # ── Database ──
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ──
  # Replace with your backend service (Spring Boot, Node, etc.)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
    # No exposed ports — reachable only via reverse-proxy

  # ── Frontend ──
  # Static SPA served by its own nginx (no TLS here — reverse-proxy handles it).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    # No exposed ports — served via reverse-proxy

  # ── Reverse Proxy (TLS termination + routing) ──
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  # ── Certbot (Let's Encrypt auto-renewal) ──
  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    volumes:
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      reverse-proxy:
        condition: service_started
    entrypoint: /bin/sh
    command: -c "while true; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 24h; done"

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge
    internal: true   # database not reachable from outside

volumes:
  postgres-data:
  certbot-challenges:
  letsencrypt:
